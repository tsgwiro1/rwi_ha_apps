  - title: Wärmepumpe PV
    path: pvwp
    icon: mdi:heat-pump
    cards:
      - type: entities
        title: ⚙️ Status
        show_header_toggle: false
        entities:
          - entity: select.pv_warmepumpen_steuerung_betriebsmodus
            name: Betriebsmodus
          - entity: sensor.pv_warmepumpen_steuerung_zustand
            name: Zustand
          - entity: sensor.pv_warmepumpen_steuerung_laufzeit
            name: Laufzeit
          - entity: sensor.pv_warmepumpen_steuerung_abschalt_timer
            name: Abschalt-Timer
          - entity: sensor.pv_warmepumpen_steuerung_standzeit
            name: Standzeit verbleibend
          - entity: binary_sensor.pv_warmepumpen_steuerung_wp_kompressor
            name: Kompressor
          - entity: binary_sensor.pv_warmepumpen_steuerung_modbus_verbindung
            name: Modbus Verbindung
      - type: glance
        title: ⚡ Leistung
        columns: 3
        show_state: true
        entities:
          - entity: sensor.pv_warmepumpen_steuerung_pv_uberschuss
            name: PV Überschuss
          - entity: sensor.pv_warmepumpen_steuerung_leistungsaufnahme
            name: WP Aufnahme
          - entity: sensor.pv_warmepumpen_steuerung_heizleistung
            name: Heizleistung
          - entity: sensor.pv_warmepumpen_steuerung_cop
            name: COP
          - entity: sensor.pv_warmepumpen_steuerung_aktives_limit
            name: Aktives Limit
          - entity: sensor.pv_warmepumpen_steuerung_energie_heute
            name: Energie heute
          - entity: sensor.pv_warmepumpen_steuerung_batteriestand
            name: Batterie SOC
      - type: gauge
        entity: sensor.pv_warmepumpen_steuerung_speichertemperatur
        name: Speichertemperatur
        unit: °C
        min: 20
        max: 60
        needle: true
        severity:
          green: 20
          yellow: 45
          red: 55
      - type: entities
        title: 🌡️ Temperaturen
        entities:
          - entity: sensor.pv_warmepumpen_steuerung_speichertemperatur
            name: Speicher (RL extern)
          - entity: sensor.pv_warmepumpen_steuerung_sollwert
            name: Sollwert (an WP)
      - type: entities
        title: 🔧 Einstellungen
        show_header_toggle: false
        entities:
          - entity: number.pv_warmepumpen_steuerung_offset
            name: Offset
          - entity: number.pv_warmepumpen_steuerung_min_pv_uberschuss
            name: Min. PV Überschuss
          - entity: number.pv_warmepumpen_steuerung_min_uberschuss_dauer
            name: Min. Überschuss-Dauer
          - entity: number.pv_warmepumpen_steuerung_min_batteriestand
            name: Min. Batteriestand
          - entity: number.pv_warmepumpen_steuerung_ausschaltverzogerung
            name: Ausschaltverzögerung
          - entity: number.pv_warmepumpen_steuerung_min_standzeit
            name: Min. Standzeit
          - entity: number.pv_warmepumpen_steuerung_max_speichertemperatur
            name: Speicherladung
          - entity: number.pv_warmepumpen_steuerung_min_leistung
            name: Min. Leistung
      - type: history-graph
        title: 📈 Leistung (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.pv_warmepumpen_steuerung_pv_uberschuss
            name: PV Überschuss
          - entity: sensor.pv_warmepumpen_steuerung_leistungsaufnahme
            name: WP Aufnahme
          - entity: sensor.pv_warmepumpen_steuerung_aktives_limit
            name: Limit
      - type: history-graph
        title: 🌡️ Temperatur (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.pv_warmepumpen_steuerung_speichertemperatur
            name: Speicher
          - entity: sensor.pv_warmepumpen_steuerung_sollwert
            name: Sollwert
      - type: history-graph
        title: 📊 COP (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.pv_warmepumpen_steuerung_cop
            name: COP
